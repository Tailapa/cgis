<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGIS &mdash; Chatbot</title>
  <link rel="stylesheet" href="/src/styles/tokens.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/charts.css" />
  <style>
    /* ── Chat layout ─────────────────────────────────────────────────────── */
    .chat-layout {
      display: flex;
      height: calc(100vh - 60px);
      position: relative;
      z-index: 2;
      overflow: hidden;
    }

    /* ── Sessions sidebar ────────────────────────────────────────────────── */
    .chat-sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--bg-deep);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header-title {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: var(--track-caps);
      color: var(--text-muted);
    }

    #sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .session-item {
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 2px;
    }

    .session-item:hover { background: var(--accent-amber-dim); }

    .session-item.active {
      background: var(--accent-amber-dim);
    }

    .session-time {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .session-id {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      .chat-sidebar {
        position: fixed;
        left: -240px;
        top: 60px;
        bottom: 0;
        z-index: 200;
        width: 240px;
        transition: left 0.2s ease;
      }
      .chat-sidebar.open { left: 0; }
    }

    /* ── Main chat area ──────────────────────────────────────────────────── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Example chips ───────────────────────────────────────────────────── */
    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 0;
    }

    .chip {
      background: var(--bg-raised);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      letter-spacing: 0.01em;
    }

    .chip:hover {
      background: var(--accent-amber-dim);
      color: var(--accent-amber);
      border-color: var(--border-active);
    }

    /* ── Messages — terminal aesthetic ───────────────────────────────────── */
    .chat-msg {
      display: flex;
      max-width: 820px;
      width: 100%;
    }

    /* Assistant: amber left border, no bubble background */
    .chat-msg.analyst {
      align-self: flex-start;
    }

    .chat-msg.analyst .msg-content {
      border-left: 2px solid var(--accent-amber);
      padding-left: 14px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    /* User: right-aligned, sage-cream bubble */
    .chat-msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .chat-msg.user .msg-content {
      background: rgba(74, 107, 94, 0.08);
      border-radius: 10px 10px 2px 10px;
      padding: 10px 16px;
      color: var(--text-primary);
      font-size: 14px;
      text-align: right;
      max-width: 600px;
    }

    .msg-content p {
      margin: 0;
      line-height: 1.6;
    }

    .copy-msg-btn {
      background: none;
      border: none;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 8px;
      padding: 0;
      letter-spacing: var(--track-caps);
      text-transform: uppercase;
      transition: color 0.12s;
    }

    .copy-msg-btn:hover { color: var(--accent-amber); }

    /* ── Input section ───────────────────────────────────────────────────── */
    .chat-input-section {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-deep);
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-prompt {
      font-family: var(--font-mono);
      color: var(--accent-amber);
      font-size: 15px;
      flex-shrink: 0;
      user-select: none;
    }

    #chat-form {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 10px;
    }

    #chat-input {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border-subtle);
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 14px;
      caret-color: var(--accent-amber);
      padding: 6px 0;
      transition: border-color 0.15s;
    }

    #chat-input:focus { border-bottom-color: var(--accent-amber); }

    #chat-input::placeholder {
      color: rgba(240, 237, 230, 0.25);
      font-family: var(--font-mono);
    }

    .chat-send-btn {
      background: none;
      border: none;
      color: var(--accent-amber);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: var(--track-caps);
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 4px;
      transition: opacity 0.12s;
      flex-shrink: 0;
    }

    .chat-send-btn:hover { opacity: 0.7; }

    /* ── Sidebar toggle (mobile) ─────────────────────────────────────────── */
    #sidebar-toggle { display: none; }

    @media (max-width: 768px) {
      #sidebar-toggle { display: flex; }
      #chat-messages  { padding: 20px 18px; }
    }
  </style>
</head>
<body>

<nav class="navbar" role="navigation" aria-label="Main navigation">
  <a href="/" class="navbar-brand">CGIS</a>
  <div class="navbar-links">
    <button id="sidebar-toggle" class="btn-secondary" aria-label="Toggle session history">Sessions</button>
    <a href="/"         class="nav-link">Dashboard</a>
    <a href="/chat"     class="nav-link active" aria-current="page">Chatbot</a>
    <a href="/admin"    class="nav-link">Admin</a>
  </div>
</nav>

<div class="chat-layout">

  <!-- Sessions sidebar (relationship history — agentic UX pillar) -->
  <aside class="chat-sidebar" id="chat-sidebar" aria-label="Previous sessions">
    <div class="sidebar-header">
      <span class="sidebar-header-title">Sessions</span>
      <button class="btn-secondary" id="new-session-btn"
        style="padding:4px 10px;font-size:11px;font-family:var(--font-mono)"
        aria-label="Start new session">New</button>
    </div>
    <div id="sessions-list" role="list" aria-label="Past sessions"></div>
  </aside>

  <!-- Main chat area -->
  <main class="chat-main" aria-label="Chat interface">
    <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <div class="chat-input-section">
      <div class="chat-input-row">
        <span class="chat-prompt" aria-hidden="true">&gt;</span>
        <form id="chat-form">
          <input
            type="text"
            id="chat-input"
            placeholder="type your message&hellip;"
            autocomplete="off"
            aria-label="Chat input"
          />
          <button type="submit" class="chat-send-btn" aria-label="Send message">Send</button>
        </form>
      </div>
    </div>
  </main>

</div>

<script type="module" src="/src/chat.ts"></script>
</body>
</html>
